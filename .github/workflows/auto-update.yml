name: Auto Update Deals

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Deal Processor Script
        run: python price_tracker.py

      - name: Commit and Push Updated Site Contents
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          if git diff --staged --quiet; then
            echo "No variations in deals detected. Skipping sync."
          else
            git commit -m "Automated Sync: Live Deals Container Refreshed"
            git push origin main
          fi

